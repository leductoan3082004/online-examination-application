services:
  # Backend Spring Boot Service
  - type: web
    name: exam-app-backend
    runtime: java
    buildCommand: "chmod +x backend/mvnw && cd backend && ./mvnw clean package -DskipTests"
    startCommand: "java -jar backend/target/online-examination-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false # Should be set manually in Render Dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # Frontend Vite/React Service
  - type: web
    name: exam-app-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    publishDir: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: exam-app-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
