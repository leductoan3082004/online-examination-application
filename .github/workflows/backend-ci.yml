name: Backend CI

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

# Stages run in sequence: lint → unit tests → integration tests.
# Each stage only runs if the previous one succeeded.
jobs:
  lint:
    name: Lint (checkstyle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Checkstyle
        run: ./mvnw checkstyle:check -B

  unit-tests:
    name: Unit tests
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Compile
        run: ./mvnw compile -B -q

      - name: Run unit tests
        run: ./mvnw test -B -Dtest='!ApiIntegrationTest'

  integration-tests:
    name: API integration tests
    needs: unit-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml

      # ApiIntegrationTest uses Testcontainers to spin up a real Postgres,
      # which needs a Docker daemon. ubuntu-latest runners have one.
      - name: Verify Docker is available
        run: docker info > /dev/null

      - name: Run API integration tests
        run: ./mvnw test -B -Dtest=ApiIntegrationTest
